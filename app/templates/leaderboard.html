{% extends "base.html" %}

{% block content %}

<div class="container mt-5">
  <h2 class="text-center mb-4">Leaderboard</h2>

  <div class="table-responsive">
    <table class="table table-striped table-hover text-center align-middle">
      <thead>
        <tr>
          <th>#</th>
          <th>Player</th>
          <th>Score</th>
          <th>Time</th>
        </tr>
      </thead>
      <tbody>
        {% for user in users %}
        <tr>
          <td>{{ loop.index }}</td>
          <td>{{ user.username }}</td>
          <td>{{ user.score }}</td>
          <td>{{ user.time_taken }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
