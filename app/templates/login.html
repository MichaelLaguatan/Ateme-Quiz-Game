{% extends "base.html" %}

{% block content %}
    <h1>Enter Name</h1>
    <form action="" method="POST" novalidate>
        {{ form.hidden_tag() }}
        <p>
            {{ form.player_name.label }}<br>
            {{ form.player_name(size=32) }}
        </p>
        <p>
            {{ form.submit() }}
        </p>
    </form>
{% endblock %}
